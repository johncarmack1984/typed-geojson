name: Release-plz

on:
  push:
    branches: [main]

# release-plz pushes the release-PR branch and version tags (contents) and opens
# the release PR (pull-requests). Crate publishing uses CARGO_REGISTRY_TOKEN.
permissions:
  contents: write
  pull-requests: write

jobs:
  # Opens (or updates) the release PR: version bump + CHANGELOG from the commits
  # since the last `v*` tag. Merging that PR is what triggers a release.
  release-pr:
    name: Release PR
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      # Act as the john-carmack-bot GitHub App so the release PR is authored by the
      # bot (and CI runs on it). Skipped until RELEASE_PLZ_APP_ID is set, leaving the
      # default GITHUB_TOKEN in use — so the workflow never breaks mid-setup.
      - uses: actions/create-github-app-token@v3
        id: app-token
        if: ${{ vars.RELEASE_PLZ_APP_ID != '' }}
        with:
          app-id: ${{ vars.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Publishes any version in Cargo.toml not yet on crates.io, then tags it and
  # cuts a GitHub release. No-ops on every push except the one merging a release PR.
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        if: ${{ vars.RELEASE_PLZ_APP_ID != '' }}
        with:
          app-id: ${{ vars.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
