name: Release-plz

on:
  push:
    branches: [main]

# release-plz pushes the release-PR branch and version tags (contents) and opens
# the release PR (pull-requests). Crate publishing uses CARGO_REGISTRY_TOKEN.
permissions:
  contents: write
  pull-requests: write

jobs:
  # Opens (or updates) the release PR: version bump + CHANGELOG from the commits
  # since the last `v*` tag. Merging that PR is what triggers a release.
  release-pr:
    name: Release PR
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          # Authors the release PR + GitHub release as john-carmack-bot (and lets
          # CI run on the PR). Falls back to the default token until the secret exists.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Publishes any version in Cargo.toml not yet on crates.io, then tags it and
  # cuts a GitHub release. No-ops on every push except the one merging a release PR.
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release
        env:
          # Authors the release PR + GitHub release as john-carmack-bot (and lets
          # CI run on the PR). Falls back to the default token until the secret exists.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
