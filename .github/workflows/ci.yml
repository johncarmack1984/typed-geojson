name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (test, clippy, fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo test
      - run: cargo test --features specta
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo clippy --all-targets --features specta -- -D warnings
      # Ensure the benchmarks keep compiling (don't run timings in CI).
      - run: cargo bench --no-run

  typescript:
    name: TS assignability vs @types/geojson
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ts/package-lock.json
      # Regenerate the bindings and fail if they drifted from what's committed.
      - run: cargo run --example export_bindings --features specta
      - run: git diff --exit-code ts/bindings.ts
      # The north star: the generated bindings must be mutually assignable with
      # @types/geojson (both directions), gated by `tsc --noEmit`.
      - working-directory: ts
        run: npm ci
      - working-directory: ts
        run: npx tsc --noEmit

  publish:
    name: Publish to crates.io
    needs: [rust, typescript]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Publishes on push to main only when Cargo.toml's version isn't yet on
      # crates.io (so bumping the version cuts a release; other pushes no-op).
      # No-ops gracefully until CARGO_REGISTRY_TOKEN is configured as a secret.
      - name: Publish if the version is new
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "CARGO_REGISTRY_TOKEN not set — skipping publish."
            exit 0
          fi
          version=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          if curl -sf -A "typed-geojson-ci" "https://crates.io/api/v1/crates/typed-geojson/${version}" >/dev/null; then
            echo "typed-geojson@${version} already on crates.io — skipping."
          else
            echo "Publishing typed-geojson@${version}…"
            cargo publish
          fi
